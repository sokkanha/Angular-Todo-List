<section class="flex flex-col p-2">

  <mat-dialog-content class="mat-typography !max-h-none">

    <div class="flex justify-between items-center gap-2 mb-1">
      <h1 class="uppercase bg-[#F6D3D9] rounded-full text-center py-1.5 px-4 w-fit h-fit font-display font-bold text-xs tracking-wider text-[#2B2320] m-0">
        {{ todoId ? 'Edit task' : 'New task' }}
      </h1>

      <button type="button" (click)="close()" aria-label="Close dialog"
        class="flex items-center justify-center size-[26px] rounded-full border-2 border-[#2B2320] hover:bg-[#F6D3D9] transition-colors duration-150"
      >
        <svg class="size-2.5" viewBox="0 0 24 24" fill="none" stroke="#2B2320" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <span class="font-hand text-[15px] text-[#8A7C73] block mb-5">
      {{ todoId ? 'Update this line in your ledger.' : 'Add a new line to your ledger.' }}
    </span>

    <form (ngSubmit)="save()">

      <div class="mb-5">
        <span class="block font-display font-bold text-xs tracking-wider uppercase text-[#B98C97] mb-2">
          What needs doing?
        </span>
        <input type="text" name="title"
          [(ngModel)]="todoData.title" placeholder="Buy birthday candles"
          class="w-full border-0 border-b-2 border-[#2B2320] bg-transparent font-hand text-[17px] text-[#2B2320] px-0.5 pt-1 pb-1.5
                 placeholder:text-[#C9BAB0] focus:outline-none focus:border-[#E99AA6] transition-colors duration-150"
        />
      </div>

      <div class="mb-5">
        <span class="block font-display font-bold text-xs tracking-wider uppercase text-[#B98C97] mb-2">
          Priority
        </span>
        <div class="flex gap-4">
          @for (item of priorities; track $index) {
            <ng-container
              *ngTemplateOutlet="priorityButton; context: { $implicit: item }">
            </ng-container>
          }
        </div>
      </div>

      <div class="mb-1">
        <span class="block font-display font-bold text-xs tracking-wider uppercase text-[#B98C97] mb-2">
          Due date
        </span>
        <div class="flex items-center gap-2.5 border-b-2 border-[#2B2320] px-0.5 pt-1 pb-1.5
                    focus-within:border-[#E99AA6] transition-colors duration-150">
          <svg class="size-4 shrink-0 text-[#2B2320]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="5" width="18" height="16" rx="2"/>
            <path d="M3 10h18M8 3v4M16 3v4"/>
          </svg>
          <input type="date"  name="due" [(ngModel)]="todoData.due" 
            class="flex-1 border-0 bg-transparent font-hand text-[17px] text-[#2B2320] focus:outline-none [color-scheme:light]"
          />
        </div>
      </div>

    </form>
  </mat-dialog-content>

  <div class="flex justify-end gap-2.5 mt-6">
    <button type="button" mat-stroked-button (click)="close()"
      class="!rounded-full !border-2 !border-[#E7DDD3] !text-[#8A7C73] !font-display !font-bold !normal-case"
    >
      Cancel
    </button>
    <button type="button" mat-flat-button  [disabled]="!canSave || loading" 
      (click)="save()" cdkFocusInitial
      class="!rounded-full !bg-[#ec8090] !text-[#FFFDF9] !font-display !font-bold !normal-case disabled:!opacity-50 disabled:!cursor-not-allowed"
    >
      {{ loading ? 'Saving…' : (todoId ? 'Save changes' : 'Add task') }}
    </button>
  </div>

</section>


<!-- Priority buttons group -->
<ng-template #priorityButton let-priority>
  <button type="button" (click)="selectPriority(priority.value)" class="flex flex-col items-center gap-1 cursor-pointer"
    [ngClass]="{'hidden': isDontForgot && priority?.value !== 'low'}">
    <span
      class="flex items-center justify-center size-[34px] rounded-full border-[1.5px] transition-colors duration-150"
      [style.border-color]="todoData.priority === priority.value? priority.border: '#E7DDD3'"
      [style.background-color]=" todoData.priority === priority.value ? priority.bg : 'transparent'"
    >
      <span class="size-[11px] rounded-full" [style.background-color]="priority.color"></span>
    </span>

    <span class="font-hand text-xs text-[#8A7C73]"> {{ priority.label }}</span>
  </button>
</ng-template>
